version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: qor3a-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: qor3a
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../backend/api/src/database:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: qor3a-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: qor3a-storage
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  backend-api:
    build:
      context: ../backend/api
      dockerfile: ../../infra/Dockerfile.api
    container_name: qor3a-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      S3_ENDPOINT: http://minio:9000
      NODE_ENV: development
    volumes:
      - ../backend/api/src:/app/src
    command: npm run dev

  ai-service:
    build:
      context: ../backend/ai
      dockerfile: ../../infra/Dockerfile.ai
    container_name: qor3a-ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ../backend/ai/src:/app/src
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload

  headless-service:
    build:
      context: ../backend/headless
      dockerfile: ../../infra/Dockerfile.headless
    container_name: qor3a-headless
    restart: unless-stopped
    ports:
      - "3001:3001"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - ../backend/headless/src:/app/src
    command: npm run dev

volumes:
  postgres_data:
  redis_data:
  minio_data:
